<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST International 자산 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #16324f;
            --navy-dark: #0d2036;
            --navy-light: #274b73;
            --green: #16a34a;
            --amber: #d97706;
            --slate: #64748b;
            --bg: #f5f7fa;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.14);
            --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.22);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
        }

        /* 상단 바 */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--white);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.25;
        }

        .brand-text strong {
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .brand-text span {
            color: #b9c6d4;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .topbar-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .segmented {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 8px;
            padding: 3px;
        }

        .global-button, .local-button {
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .global-button:hover, .local-button:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--white);
        }

        .global-button.active, .local-button.active {
            background: var(--white);
            color: var(--navy);
            font-weight: 700;
        }

        #localCountrySelect {
            appearance: none;
            -webkit-appearance: none;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z" fill="%23cbd5e1"/></svg>') no-repeat right 11px center;
            border: none;
            border-radius: 6px;
            padding: 7px 30px 7px 16px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            min-width: 92px;
        }

        #localCountrySelect:hover {
            background-color: rgba(255, 255, 255, 0.12);
            color: var(--white);
        }

        #localCountrySelect.active {
            background-color: var(--white);
            color: var(--navy);
            font-weight: 700;
        }

        #localCountrySelect option {
            color: var(--text);
            background: var(--white);
        }

        #localCountrySelect:focus {
            outline: none;
        }

        /* 지도 */
        /* Google Maps가 초기화 시 이 요소의 position을 강제로 relative로 덮어쓰므로,
           fixed+inset 방식 대신 margin-top과 명시적 height로 크기를 지정한다. */
        #map {
            margin-top: 64px;
            height: calc(100vh - 64px);
            width: 100%;
        }

        /* 범례 / 통계 패널 */
        .legend-panel {
            position: fixed;
            left: 20px;
            bottom: 24px;
            z-index: 900;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 16px 18px;
            min-width: 220px;
            font-size: 13px;
        }

        .legend-stats {
            display: flex;
            gap: 20px;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .legend-stats .stat {
            display: flex;
            flex-direction: column;
        }

        .legend-stats .stat strong {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: var(--navy);
            line-height: 1.2;
        }

        .legend-stats .stat span {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .legend-categories {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-weight: 500;
            padding: 4px 0;
        }

        .legend-item .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-item b {
            margin-left: auto;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--navy);
        }

        .dot-all { background: var(--navy); }
        .dot-realestate { background: var(--slate); }
        .dot-renewable { background: var(--green); }
        .dot-resource { background: var(--amber); }

        /* 상단 카테고리 필터 바 */
        .category-filter-bar {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 8px;
            padding: 3px;
        }

        .category-chip-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .category-chip-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--white);
        }

        .category-chip-btn.active {
            background: var(--white);
            color: var(--navy);
            font-weight: 700;
        }

        .chip-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: flex;
        }

        .chip-icon svg {
            width: 100%;
            height: 100%;
        }

        /* 카테고리 배지 */
        .category-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 10px;
            color: var(--white);
        }

        .category-realestate { background: var(--slate); }
        .category-renewable { background: var(--green); }
        .category-resource { background: var(--amber); }

        /* Google Maps 기본 닫기 버튼 숨기기 */
        .gm-style-iw button {
            display: none !important;
        }

        /* 팝업 창 스타일 */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 32, 54, 0.55);
            z-index: 2000;
        }

        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 400px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
        }

        .popup-content h3 {
            margin: 0 0 12px;
            padding-right: 24px;
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
        }

        .popup-content p {
            margin: 0 0 15px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .popup-content .established-date {
            display: inline-block;
            font-weight: 600;
            font-size: 12px;
            color: var(--navy-light);
            background: #eef2f7;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .popup-content .close-button {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
            background: var(--bg);
            transition: background 0.15s ease, color 0.15s ease;
        }

        .popup-content .close-button:hover {
            background: var(--border);
            color: var(--text);
        }

        .popup-content img.asset-image {
            max-width: 100%;
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-top: 4px;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">ST</span>
            <div class="brand-text">
                <strong>ST International</strong>
                <span>Global Asset Map</span>
            </div>
        </div>
        <div class="topbar-controls">
            <div class="category-filter-bar" id="categoryFilterBar">
                <button class="category-chip-btn active" data-filter="all" onclick="setCategoryFilter('all')">
                    <span class="chip-icon"></span>전체
                </button>
                <button class="category-chip-btn" data-filter="realestate" onclick="setCategoryFilter('realestate')">
                    <span class="chip-icon"></span>부동산 자산관리
                </button>
                <button class="category-chip-btn" data-filter="renewable" onclick="setCategoryFilter('renewable')">
                    <span class="chip-icon"></span>신재생에너지
                </button>
                <button class="category-chip-btn" data-filter="resource" onclick="setCategoryFilter('resource')">
                    <span class="chip-icon"></span>자원/에너지인프라
                </button>
            </div>
            <div class="segmented">
                <button class="global-button active" id="globalBtn" onclick="resetMap()">Global</button>
                <select id="localCountrySelect" onchange="moveToCountry()" aria-label="국가 선택">
                    <option value="">Local</option>
                </select>
            </div>
        </div>
    </header>

    <div id="map"></div>

    <div class="legend-panel" id="legendPanel">
        <div class="legend-stats">
            <div class="stat">
                <strong id="statTotal">0</strong>
                <span id="statTotalLabel">총 자산</span>
            </div>
            <div class="stat">
                <strong id="statScope">0</strong>
                <span id="statScopeLabel">진출 국가</span>
            </div>
        </div>
        <div class="legend-categories">
            <div class="legend-item"><span class="dot dot-realestate"></span>부동산 자산관리<b id="countRealestate">0</b></div>
            <div class="legend-item"><span class="dot dot-renewable"></span>신재생에너지<b id="countRenewable">0</b></div>
            <div class="legend-item"><span class="dot dot-resource"></span>자원/에너지인프라<b id="countResource">0</b></div>
        </div>
    </div>

    <!-- 팝업 창 -->
    <div class="popup-overlay" id="popupOverlay" onclick="if (event.target === this) closePopup()">
        <div class="popup-content" id="popupContent">
            <span class="close-button" onclick="closePopup()">✕</span>
            <h3 id="popupTitle"></h3>
            <p id="popupDescription"></p>
            <div id="popupExtra"></div>
        </div>
    </div>

    <!-- assets.js 로드 -->
    <script src="./assets.js"></script>
    <script>
        // 전역 변수 정의
        let map;
        let markers = [];
        let currentCountryAssets = null;
        let currentCountry = null; // 현재 로컬로 보고 있는 국가 (null이면 글로벌 상태)
        let assetsByCountry = null;
        let lastViewedAsset = null; // 마지막으로 확인한 자산 저장
        let updateMarkers = () => {}; // initMap에서 실제 구현이 할당됨 (전역에서도 호출 가능하도록)

        // 카테고리 -> 스타일 클래스 매핑
        const categoryClassMap = {
            "부동산 자산관리": "realestate",
            "신재생에너지": "renewable",
            "자원/에너지인프라": "resource"
        };

        // 필터 슬러그 -> 카테고리 (역매핑)
        const slugToCategory = {};
        Object.entries(categoryClassMap).forEach(([category, slug]) => {
            slugToCategory[slug] = category;
        });

        function categoryClass(category) {
            return categoryClassMap[category] || "realestate";
        }

        // 카테고리별 색상 및 마커 글리프 (지도 위 아이콘 구분용)
        const categoryColors = {
            all: "#16324f",
            realestate: "#64748b",
            renewable: "#16a34a",
            resource: "#d97706"
        };

        const categoryGlyphs = {
            all: `<g fill="{{color}}">
                <rect x="10" y="10" width="6" height="6"/>
                <rect x="18" y="10" width="6" height="6"/>
                <rect x="10" y="18" width="6" height="6"/>
                <rect x="18" y="18" width="6" height="6"/>
            </g>`,
            realestate: `<g fill="none" stroke="{{color}}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="11" y="12" width="6" height="10"/>
                <rect x="18" y="9" width="6" height="13"/>
                <line x1="13" y1="15" x2="15" y2="15"/>
                <line x1="13" y1="18" x2="15" y2="18"/>
                <line x1="20" y1="12" x2="22" y2="12"/>
                <line x1="20" y1="15" x2="22" y2="15"/>
                <line x1="20" y1="18" x2="22" y2="18"/>
            </g>`,
            renewable: `<g stroke="{{color}}" stroke-width="1.7" stroke-linecap="round">
                <line x1="17" y1="11" x2="17" y2="24"/>
                <line x1="17" y1="11" x2="23" y2="9"/>
                <line x1="17" y1="11" x2="12" y2="7"/>
                <line x1="17" y1="11" x2="14" y2="16"/>
            </g>`,
            resource: `<path fill="{{color}}" d="M18.5 8L11 19h5.2l-1.7 8L23 15h-5.3z"/>`
        };

        function glyphMarkup(slug) {
            const color = categoryColors[slug];
            return categoryGlyphs[slug].replace(/\{\{color\}\}/g, color);
        }

        // 카테고리별 핀 아이콘을 SVG data URI로 생성 (지도 마커용)
        const categoryIconCache = {};
        function categoryMarkerIcon(category) {
            const slug = categoryClass(category);
            if (!categoryIconCache[slug]) {
                const color = categoryColors[slug];
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">
                    <path d="M17 0C7.6 0 0 7.6 0 17c0 11 17 27 17 27s17-16 17-27C34 7.6 26.4 0 17 0z" fill="${color}"/>
                    <circle cx="17" cy="17" r="10.5" fill="#ffffff"/>
                    ${glyphMarkup(slug)}
                </svg>`;
                categoryIconCache[slug] = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
            }
            return {
                url: categoryIconCache[slug],
                scaledSize: new google.maps.Size(34, 44),
                anchor: new google.maps.Point(17, 44)
            };
        }

        // 상단 필터 바에 쓰이는 원형 칩 아이콘 (핀 꼬리 없이 원 안 글리프만)
        function categoryChipSvgMarkup(slug) {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 4 26 26">
                <circle cx="17" cy="17" r="13" fill="#ffffff"/>
                ${glyphMarkup(slug)}
            </svg>`;
        }

        // 상단 카테고리 필터 버튼에 아이콘 채우기 (Google Maps 로드를 기다릴 필요 없음)
        document.querySelectorAll(".category-chip-btn").forEach(btn => {
            const slot = btn.querySelector(".chip-icon");
            if (slot) slot.innerHTML = categoryChipSvgMarkup(btn.dataset.filter);
        });

        // 국가 -> 국기 이미지 매핑
        const countryFlags = {
            "한국": "./kr.png",
            "미국": "./us.png",
            "베트남": "./vn.png",
            "인도네시아": "./id.png"
        };

        // 국가별 PNG 이미지를 지도 마커에 직접 사용 (줌아웃된 국가 단위 마커용)
        function countryMarkerIcon(country) {
            const flagUrl = countryFlags[country];
            if (!flagUrl) return categoryMarkerIcon(""); // 매핑에 없는 국가는 기본 핀으로 대체
            return {
                url: flagUrl,
                scaledSize: new google.maps.Size(44, 44),
                anchor: new google.maps.Point(22, 22)
            };
        }

        // 현재 선택된 카테고리 필터 (null = 전체)
        let activeCategoryFilter = null;

        function getFilteredAssets() {
            if (!activeCategoryFilter) return assets;
            return assets.filter(asset => asset.category === activeCategoryFilter);
        }

        function setCategoryFilter(slug) {
            activeCategoryFilter = slug === "all" ? null : slugToCategory[slug];
            document.querySelectorAll(".category-chip-btn").forEach(el => {
                el.classList.toggle("active", el.dataset.filter === slug);
            });
            updateMarkers();

            // 로컬(국가) 상태에서 필터링하면, 그 국가의 필터링된 자산이 한눈에 보이도록 줌 재조정
            if (currentCountry) {
                const countryFilteredAssets = getFilteredAssets().filter(asset => asset.country === currentCountry);
                if (countryFilteredAssets.length > 0) {
                    currentCountryAssets = countryFilteredAssets;
                    moveToAssets();
                }
            }
        }

        // 카테고리별 자산 개수 집계 (하단 패널 표시용)
        function renderCategoryCounts(assetList) {
            const counts = { realestate: 0, renewable: 0, resource: 0 };
            assetList.forEach(asset => {
                counts[categoryClass(asset.category)]++;
            });
            document.getElementById("countRealestate").textContent = counts.realestate;
            document.getElementById("countRenewable").textContent = counts.renewable;
            document.getElementById("countResource").textContent = counts.resource;
        }

        // 하단 패널을 전체(글로벌) 통계로 표시
        function showGlobalStats() {
            document.getElementById("statTotal").textContent = assets.length;
            document.getElementById("statTotalLabel").textContent = "총 자산";
            document.getElementById("statScope").textContent = Object.keys(assetsByCountry).length;
            document.getElementById("statScopeLabel").textContent = "진출 국가";
            renderCategoryCounts(assets);
        }

        // 하단 패널을 선택한 국가 기준 통계로 표시
        function showCountryStats(country) {
            const countryAssets = assetsByCountry[country] || [];
            document.getElementById("statTotal").textContent = countryAssets.length;
            document.getElementById("statTotalLabel").textContent = "자산 수";
            document.getElementById("statScope").textContent = country;
            document.getElementById("statScopeLabel").textContent = "선택 국가";
            renderCategoryCounts(countryAssets);
        }

        // 지도 초기화 함수
        function initMap() {
            // assets 변수가 정의되었는지 확인
            if (typeof assets === "undefined") {
                console.error("Error: 'assets' is not defined. Ensure assets.js is loaded correctly.");
                return;
            }

            // 자산을 국가별로 그룹화
            assetsByCountry = assets.reduce((acc, asset) => {
                const country = asset.country;
                if (!acc[country]) {
                    acc[country] = [];
                }
                acc[country].push(asset);
                return acc;
            }, {});

            // 통계 패널 업데이트 (전체 기준)
            showGlobalStats();

            // 드랍다운 메뉴에 국가 목록 추가
            const countryDropdown = document.getElementById("localCountrySelect");
            Object.keys(assetsByCountry).sort().forEach(country => {
                const option = document.createElement("option");
                option.value = country;
                option.textContent = country;
                countryDropdown.appendChild(option);
            });

            // 지도 중심 설정 (전 세계)
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 3,
                center: { lat: 0, lng: 0 },
                fullscreenControl: false,
                mapTypeId: google.maps.MapTypeId.SATELLITE
            });

            // 초기 줌 레벨 출력
            console.log(`Zoom level: ${map.getZoom()}`);

            // 줌 레벨 변화 감지
            map.addListener("zoom_changed", () => {
                console.log(`Zoom level: ${map.getZoom()}`);
                updateMarkers();
            });

            // 마커 업데이트 함수 (전역 변수에 할당하여 initMap 밖에서도 호출 가능하게 함)
            updateMarkers = function() {
                // 기존 마커 제거
                markers.forEach(marker => marker.setMap(null));
                markers = [];

                const zoom = map.getZoom();
                const filteredAssets = getFilteredAssets();

                if (zoom <= 3) {
                    // 줌 레벨 3 이하: 국가별 마커 표시 (필터 적용된 자산 기준)
                    const filteredByCountry = filteredAssets.reduce((acc, asset) => {
                        const country = asset.country;
                        if (!acc[country]) acc[country] = [];
                        acc[country].push(asset);
                        return acc;
                    }, {});

                    Object.keys(filteredByCountry).forEach(country => {
                        const countryAssets = filteredByCountry[country];
                        // 국가 중심점 계산 (자산 위치의 평균)
                        let latSum = 0, lngSum = 0;
                        countryAssets.forEach(asset => {
                            latSum += asset.position.lat;
                            lngSum += asset.position.lng;
                        });
                        const center = {
                            lat: latSum / countryAssets.length,
                            lng: lngSum / countryAssets.length
                        };

                        const marker = new google.maps.Marker({
                            position: center,
                            map: map,
                            title: country,
                            icon: activeCategoryFilter ? categoryMarkerIcon(activeCategoryFilter) : countryMarkerIcon(country)
                        });

                        // 국가 마커 클릭 시 팝업 없이 바로 해당 국가 자산으로 이동 + 하단 패널 갱신
                        marker.addListener("click", () => {
                            currentCountryAssets = countryAssets;
                            currentCountry = country;
                            moveToAssets();
                            showCountryStats(country);
                            document.getElementById("localCountrySelect").value = country;
                            setActiveToggle("localBtn");
                        });

                        markers.push(marker);
                    });
                } else {
                    // 줌 레벨 4 이상: 개별 자산 마커 표시 (카테고리별 아이콘)
                    filteredAssets.forEach(asset => {
                        const marker = new google.maps.Marker({
                            position: asset.position,
                            map: map,
                            title: asset.title,
                            icon: categoryMarkerIcon(asset.category)
                        });

                        marker.addListener("click", () => {
                            // 팝업 창 표시 및 줌 조정 (asset 객체 전달)
                            showPopup(asset.title, asset.description, `
                                <span class="category-badge category-${categoryClass(asset.category)}">${asset.category}</span>
                                <p class="established-date">투자/설립시기: ${asset.establishedDate}</p>
                                <!-- <img src="${asset.logoUrl}" alt="Logo" class="logo"> -->
                                <img src="${asset.imageUrl}" alt="${asset.title}" class="asset-image">
                            `, asset);
                            // 줌 레벨 17로 설정 및 자산 위치 중심
                            map.setZoom(17);
                            map.setCenter(asset.position);
                        });

                        markers.push(marker);
                    });
                }
            };

            // 초기 마커 설정
            updateMarkers();
        }

        // 팝업 창 표시 함수 (개별 자산용)
        function showPopup(title, description, extraContent, asset = null) {
            const popupOverlay = document.getElementById("popupOverlay");
            const popupTitle = document.getElementById("popupTitle");
            const popupDescription = document.getElementById("popupDescription");
            const popupExtra = document.getElementById("popupExtra");

            // 팝업 내용 설정
            popupTitle.textContent = title;
            popupDescription.textContent = description;
            popupExtra.innerHTML = extraContent;

            // 마지막으로 확인한 자산 저장
            if (asset) {
                lastViewedAsset = asset;
            }

            // 팝업 표시
            popupOverlay.style.display = "block";
        }

        // 팝업 창 닫기 함수
        function closePopup() {
            document.getElementById("popupOverlay").style.display = "none";
        }

        // 상단 Global/Local 토글 버튼 활성 상태 갱신
        function setActiveToggle(activeId) {
            document.getElementById("globalBtn").classList.toggle("active", activeId === "globalBtn");
            document.getElementById("localCountrySelect").classList.toggle("active", activeId === "localBtn");
        }

        // 자산으로 이동 함수
        function moveToAssets() {
            if (currentCountryAssets) {
                const bounds = new google.maps.LatLngBounds();
                currentCountryAssets.forEach(asset => {
                    bounds.extend(new google.maps.LatLng(asset.position.lat, asset.position.lng));
                });
                map.fitBounds(bounds);

                // 줌 레벨 제한
                const currentZoom = map.getZoom();
                if (currentZoom > 10) map.setZoom(10);
                if (currentZoom < 4) map.setZoom(4);
            }
        }

        // 드랍다운에서 국가 선택 시 이동 함수
        function moveToCountry() {
            const countryDropdown = document.getElementById("localCountrySelect");
            const selectedCountry = countryDropdown.value;
            if (selectedCountry && assetsByCountry[selectedCountry]) {
                currentCountryAssets = assetsByCountry[selectedCountry];
                currentCountry = selectedCountry;
                moveToAssets();
                showCountryStats(selectedCountry);
                setActiveToggle("localBtn");
            }
        }

        // Global 버튼 클릭 시 지도 초기 상태로 복원
        function resetMap() {
            map.setZoom(3);
            map.setCenter({ lat: 0, lng: 0 });
            currentCountry = null;
            updateMarkers();
            document.getElementById("localCountrySelect").value = "";
            setActiveToggle("globalBtn");
            showGlobalStats();
        }
    </script>

    <!-- Google Maps JavaScript API 로드 -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKZ64N6aTmQLaU312nCqXeyrNa-lol2IQ&callback=initMap&loading=async">
    </script>
