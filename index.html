<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST International 자산 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #16324f;
            --navy-dark: #0d2036;
            --navy-light: #274b73;
            --green: #16a34a;
            --amber: #d97706;
            --slate: #64748b;
            --bg: #f5f7fa;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.14);
            --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.22);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
        }

        /* 상단 바 */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--navy);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 24px;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--white);
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.25;
        }

        .brand-text strong {
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .brand-text span {
            color: #b9c6d4;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .topbar-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* 국가별 마커 칩 (구 Global/Local 컨트롤 자리) */
        .country-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .country-chip-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            padding: 5px 12px 5px 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .country-chip-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            color: var(--white);
        }

        .country-chip-btn.active {
            background: var(--white);
            color: var(--navy);
            border-color: var(--white);
            font-weight: 700;
        }

        .country-chip-flag {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* 지도 */
        /* Google Maps가 초기화 시 이 요소의 position을 강제로 relative로 덮어쓰므로,
           fixed+inset 방식 대신 margin-top과 명시적 height로 크기를 지정한다. */
        #map {
            /* 실제 높이는 topbar 실측 높이에 맞춰 JS(syncTopbarHeight)가 지정한다 */
            margin-top: 64px;
            height: calc(100vh - 64px);
            width: 100%;
        }

        /* 카테고리별 자산 유형(마커 아이콘) 서브 필터 바 (브랜드 우측, 같은 줄).
           "전체" 버튼 + 카테고리별 테두리 박스(그룹명 윗줄 가운데 정렬 + 세부 마커 칩 아랫줄)로 구성.
           폭이 부족하면 박스 단위로 줄바꿈되며 가로 스크롤은 없다. */
        .subtype-bar {
            display: flex;
            align-items: stretch;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .subtype-bar > .category-chip-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .subtype-groupbox {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            padding: 6px 12px;
            flex-shrink: 0;
        }

        .subtype-group-chips {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .subtype-chip-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 3px 10px 3px 4px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        .subtype-chip-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--white);
        }

        .subtype-chip-btn.active {
            background: var(--white);
            color: var(--navy);
            border-color: var(--white);
            font-weight: 700;
        }

        .subtype-chip-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: flex;
        }

        .subtype-chip-icon svg {
            width: 100%;
            height: 100%;
        }

        /* 범례 / 통계 패널 */
        .legend-panel {
            position: fixed;
            left: 20px;
            bottom: 24px;
            z-index: 900;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            padding: 16px 18px;
            min-width: 220px;
            font-size: 13px;
        }

        .legend-stats {
            display: flex;
            gap: 20px;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .legend-stats .stat {
            display: flex;
            flex-direction: column;
        }

        .legend-stats .stat strong {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: var(--navy);
            line-height: 1.2;
        }

        .legend-stats .stat span {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .legend-categories {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-weight: 500;
            padding: 4px 0;
        }

        .legend-item .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-item b {
            margin-left: auto;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--navy);
        }

        .dot-all { background: var(--navy); }
        .dot-realestate { background: var(--slate); }
        .dot-renewable { background: var(--green); }
        .dot-resource { background: var(--amber); }

        .category-chip-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .category-chip-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--white);
        }

        .category-chip-btn.active {
            background: var(--white);
            color: var(--navy);
            font-weight: 700;
        }

        .chip-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: flex;
        }

        .chip-icon svg {
            width: 100%;
            height: 100%;
        }

        /* 카테고리 배지 */
        .category-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 10px;
            color: var(--white);
        }

        .category-realestate { background: var(--slate); }
        .category-renewable { background: var(--green); }
        .category-resource { background: var(--amber); }

        /* Google Maps 기본 닫기 버튼 숨기기 */
        .gm-style-iw button {
            display: none !important;
        }

        /* 팝업 창 스타일 */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 32, 54, 0.55);
            z-index: 2000;
        }

        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 400px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
        }

        .popup-content h3 {
            margin: 0 0 12px;
            padding-right: 24px;
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
        }

        .popup-content p {
            margin: 0 0 15px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .popup-content .established-date {
            display: inline-block;
            font-weight: 600;
            font-size: 12px;
            color: var(--navy-light);
            background: #eef2f7;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .popup-content .close-button {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
            background: var(--bg);
            transition: background 0.15s ease, color 0.15s ease;
        }

        .popup-content .close-button:hover {
            background: var(--border);
            color: var(--text);
        }

        .popup-content img.asset-image {
            max-width: 100%;
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-top: 4px;
            border-radius: 10px;
            display: block;
        }

        /* 상단 마커/카테고리 칩 클릭 시 해당 자산 목록을 모아 보여주는 패널 */
        .results-panel {
            position: fixed;
            right: 20px;
            bottom: 24px;
            width: 300px;
            max-height: 50vh;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            z-index: 950;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .results-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 13px;
            color: var(--navy);
        }

        .results-panel-close {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .results-panel-close:hover {
            background: var(--border);
            color: var(--text);
        }

        .results-panel-list {
            overflow-y: auto;
            padding: 6px;
        }

        .results-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: transparent;
            border: none;
            border-radius: 8px;
            padding: 8px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }

        .results-item:hover {
            background: var(--bg);
        }

        .results-item-thumb {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg);
        }

        .results-item-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .results-item-text strong {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .results-item-text span {
            font-size: 11px;
            color: var(--text-muted);
        }

        .results-panel-empty {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">ST</span>
            <div class="brand-text">
                <strong>ST International</strong>
                <span>Global Asset Map</span>
            </div>
        </div>
        <div class="subtype-bar" id="subtypeBar"></div>
        <div class="topbar-controls">
            <div class="country-bar" id="countryBar"></div>
        </div>
    </header>

    <div id="map"></div>

    <div class="legend-panel" id="legendPanel">
        <div class="legend-stats">
            <div class="stat">
                <strong id="statTotal">0</strong>
                <span id="statTotalLabel">총 자산</span>
            </div>
            <div class="stat">
                <strong id="statScope">0</strong>
                <span id="statScopeLabel">진출 국가</span>
            </div>
        </div>
        <div class="legend-categories">
            <div class="legend-item"><span class="dot dot-realestate"></span>부동산 자산관리<b id="countRealestate">0</b></div>
            <div class="legend-item"><span class="dot dot-renewable"></span>신재생에너지<b id="countRenewable">0</b></div>
            <div class="legend-item"><span class="dot dot-resource"></span>자원/에너지인프라<b id="countResource">0</b></div>
        </div>
    </div>

    <!-- 상단 카테고리/마커 칩 클릭 시 해당 자산 목록 -->
    <div class="results-panel" id="resultsPanel">
        <div class="results-panel-header">
            <span id="resultsPanelTitle">전체 자산</span>
            <span class="results-panel-close" onclick="closeResultsPanel()">✕</span>
        </div>
        <div class="results-panel-list" id="resultsPanelList"></div>
    </div>

    <!-- 팝업 창 -->
    <div class="popup-overlay" id="popupOverlay" onclick="if (event.target === this) closePopup()">
        <div class="popup-content" id="popupContent">
            <span class="close-button" onclick="closePopup()">✕</span>
            <h3 id="popupTitle"></h3>
            <p id="popupDescription"></p>
            <div id="popupExtra"></div>
        </div>
    </div>

    <!-- assets.js 로드 -->
    <script src="./assets.js"></script>
    <script>
        // 전역 변수 정의
        let map;
        let markers = [];
        let assetsByCountry = null;
        let lastViewedAsset = null; // 마지막으로 확인한 자산 저장
        let updateMarkers = () => {}; // initMap에서 실제 구현이 할당됨 (전역에서도 호출 가능하도록)

        // 카테고리 -> 스타일 클래스 매핑
        const categoryClassMap = {
            "부동산 자산관리": "realestate",
            "신재생에너지": "renewable",
            "자원/에너지인프라": "resource"
        };

        // 필터 슬러그 -> 카테고리 (역매핑)
        const slugToCategory = {};
        Object.entries(categoryClassMap).forEach(([category, slug]) => {
            slugToCategory[slug] = category;
        });

        function categoryClass(category) {
            return categoryClassMap[category] || "realestate";
        }

        // 카테고리별 색상 및 마커 글리프 (지도 위 아이콘 구분용)
        const categoryColors = {
            all: "#16324f",
            realestate: "#64748b",
            renewable: "#16a34a",
            resource: "#d97706"
        };

        const categoryGlyphs = {
            all: `<g fill="{{color}}">
                <rect x="10" y="10" width="6" height="6"/>
                <rect x="18" y="10" width="6" height="6"/>
                <rect x="10" y="18" width="6" height="6"/>
                <rect x="18" y="18" width="6" height="6"/>
            </g>`,
            realestate: `<g fill="none" stroke="{{color}}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="11" y="12" width="6" height="10"/>
                <rect x="18" y="9" width="6" height="13"/>
                <line x1="13" y1="15" x2="15" y2="15"/>
                <line x1="13" y1="18" x2="15" y2="18"/>
                <line x1="20" y1="12" x2="22" y2="12"/>
                <line x1="20" y1="15" x2="22" y2="15"/>
                <line x1="20" y1="18" x2="22" y2="18"/>
            </g>`,
            renewable: `<g stroke="{{color}}" stroke-width="1.7" stroke-linecap="round">
                <line x1="17" y1="11" x2="17" y2="24"/>
                <line x1="17" y1="11" x2="23" y2="9"/>
                <line x1="17" y1="11" x2="12" y2="7"/>
                <line x1="17" y1="11" x2="14" y2="16"/>
            </g>`,
            resource: `<path fill="{{color}}" d="M18.5 8L11 19h5.2l-1.7 8L23 15h-5.3z"/>`
        };

        function glyphMarkup(slug) {
            const color = categoryColors[slug];
            return categoryGlyphs[slug].replace(/\{\{color\}\}/g, color);
        }

        // 카테고리별 핀 아이콘을 SVG data URI로 생성 (지도 마커용)
        const categoryIconCache = {};
        function categoryMarkerIcon(category) {
            const slug = categoryClass(category);
            if (!categoryIconCache[slug]) {
                const color = categoryColors[slug];
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">
                    <path d="M17 0C7.6 0 0 7.6 0 17c0 11 17 27 17 27s17-16 17-27C34 7.6 26.4 0 17 0z" fill="${color}"/>
                    <circle cx="17" cy="17" r="10.5" fill="#ffffff"/>
                    ${glyphMarkup(slug)}
                </svg>`;
                categoryIconCache[slug] = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
            }
            return {
                url: categoryIconCache[slug],
                scaledSize: new google.maps.Size(34, 44),
                anchor: new google.maps.Point(17, 44)
            };
        }

        // 자산의 실제 사업 특징을 판별해 개별 마커 심볼을 다르게 표시한다.
        const assetGlyphs = {
            wind: `<g fill="none" stroke="{{color}}" stroke-width="1.7" stroke-linecap="round"><circle cx="17" cy="14" r="1.5"/><path d="M17 15.5v10M17 14l6-3M17 14l-5-5M17 14l-4 6"/></g>`,
            solar: `<g fill="none" stroke="{{color}}" stroke-width="1.5" stroke-linecap="round"><rect x="10" y="14" width="14" height="8" rx="1"/><path d="M13 14l-1 8M17 14v8M21 14l1 8M10 18h14M17 22v3M13 25h8"/></g>`,
            biomass: `<path fill="{{color}}" d="M24 9c-7 .5-12 4.5-12 10 0 3.2 2.2 5.5 5.2 5.5 5.8 0 7.2-7.7 6.8-15.5zM12 25c2.2-5.2 5.3-8.3 9.5-11-3.2 3.7-5.3 7.6-6.2 12z"/>`,
            plant: `<g fill="{{color}}"><path d="M9 24V14l5 3v-4l5 3v-6h5v14z"/><rect x="11" y="20" width="2" height="2" fill="#fff"/><rect x="16" y="20" width="2" height="2" fill="#fff"/><rect x="21" y="19" width="2" height="3" fill="#fff"/></g>`,
            mine: `<g fill="none" stroke="{{color}}" stroke-width="1.8" stroke-linecap="round"><path d="M10 24l6-13M12 10l9 5M20 11l-7 14M9 24h16"/></g>`,
            truck: `<g fill="none" stroke="{{color}}" stroke-width="1.7" stroke-linejoin="round"><path d="M9 14h10v8H9zM19 17h4l3 3v2h-7z"/><circle cx="13" cy="24" r="2"/><circle cx="22" cy="24" r="2"/></g>`,
            ship: `<g fill="none" stroke="{{color}}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19h16l-3 6H12zM13 19v-6h8v6M17 13V9M17 9h5"/></g>`,
            palm: `<g fill="none" stroke="{{color}}" stroke-width="1.7" stroke-linecap="round"><path d="M17 14c-2 4-2 8-1 12M17 14c-4-4-7-3-8-1M17 14c-1-5 2-7 4-7M17 14c4-3 7-1 8 1M17 14c3 1 4 4 4 6"/></g>`,
            gas: `<path fill="{{color}}" d="M18 7c1 5-4 6-4 10 0 2 1 3 2 4-3-1-4-3-4-5-3 3-4 6-3 9 1 4 4 6 8 6s8-3 8-8c0-6-4-10-7-16zm0 20c-2 0-3-1-3-3 0-1 1-3 3-5 0 3 3 3 3 6 0 1-1 2-3 2z" transform="translate(0 -2) scale(.95)"/>`,
            golf: `<g fill="none" stroke="{{color}}" stroke-width="1.7" stroke-linecap="round"><path d="M13 25V9l9 3-9 3M9 25h10"/><circle cx="23" cy="23" r="2" fill="{{color}}"/></g>`,
            hotel: `<g fill="none" stroke="{{color}}" stroke-width="1.6"><path d="M10 24V10h14v14M14 24v-4h6v4"/><path d="M13 14h2M19 14h2M13 17h2M19 17h2"/></g>`
        };

        function getAssetType(asset) {
            if (asset.title === "PT. SAMINDO RESOURCES TBK. (SRT)" || asset.title === "동해임산") return null;
            const text = `${asset.title} ${asset.description}`.toLowerCase();
            if (/palm oil|팜오일|농장|plantation/.test(text)) return "palm";
            if (/천연가스|\blpg\b|condensate|\bgas\b/.test(text)) return "gas";
            if (/apex clean energy/.test(text)) return "solar";
            if (/풍력|wind/.test(text)) return "wind";
            if (/태양광|solar|\bess\b/.test(text)) return "solar";
            if (/바이오매스|biomass/.test(text)) return "biomass";
            if (/골프|golf/.test(text)) return "golf";
            if (/호텔|리조트|hotel|sofitel/.test(text)) return "hotel";
            if (/해상운송|shipping|barge|sea bridge|alur biru/.test(text)) return "ship";
            if (/내륙운송|운반 트럭|trasindo|suk|truck/.test(text)) return "truck";
            if (/광산|광업|채굴|석탄광|kideco|samindo|mintec|transkon/.test(text)) return "mine";
            if (/발전소|power|electric/.test(text)) return "plant";
            return null;
        }

        // 카테고리(슬러그) + 자산 유형 조합으로 마커 아이콘을 생성 (지도 마커 & 필터 아이콘 공용)
        const assetIconCache = {};
        function typeMarkerIcon(slug, type) {
            if (!type || type === "default" || !assetGlyphs[type]) return categoryMarkerIcon(slugToCategory[slug] || slug);
            const cacheKey = `${slug}-${type}`;
            if (!assetIconCache[cacheKey]) {
                const color = categoryColors[slug];
                const glyph = assetGlyphs[type].replace(/\{\{color\}\}/g, color);
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">
                    <path d="M17 0C7.6 0 0 7.6 0 17c0 11 17 27 17 27s17-16 17-27C34 7.6 26.4 0 17 0z" fill="${color}"/>
                    <circle cx="17" cy="17" r="10.5" fill="#ffffff"/>
                    ${glyph}
                </svg>`;
                assetIconCache[cacheKey] = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
            }
            return {
                url: assetIconCache[cacheKey],
                scaledSize: new google.maps.Size(34, 44),
                anchor: new google.maps.Point(17, 44)
            };
        }

        function assetMarkerIcon(asset) {
            const slug = categoryClass(asset.category);
            const type = getAssetType(asset) || "default";
            return typeMarkerIcon(slug, type);
        }

        // 상단 필터 바에 쓰이는 원형 칩 아이콘 (핀 꼬리 없이 원 안 글리프만)
        function categoryChipSvgMarkup(slug) {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 4 26 26">
                <circle cx="17" cy="17" r="13" fill="#ffffff"/>
                ${glyphMarkup(slug)}
            </svg>`;
        }

        // 자산 유형(마커 아이콘 종류)의 한글 표시명
        const typeLabels = {
            wind: "풍력",
            solar: "태양광",
            biomass: "바이오매스",
            plant: "발전소",
            mine: "광산",
            truck: "육상운송",
            ship: "해상운송",
            palm: "팜오일",
            gas: "가스",
            golf: "골프",
            hotel: "호텔·리조트",
            default: "기타"
        };

        // 서브필터 칩 정렬 순서 (typeLabels 키 순서를 그대로 사용: ...가스, 골프, 호텔·리조트, 기타)
        const typeOrder = Object.keys(typeLabels);

        // 카테고리(슬러그)별로 실제 존재하는 자산 유형을 자산 데이터에서 직접 집계
        function buildCategoryTypes() {
            const result = {};
            assets.forEach(asset => {
                const slug = categoryClass(asset.category);
                const type = getAssetType(asset) || "default";
                if (!result[slug]) result[slug] = [];
                if (!result[slug].includes(type)) result[slug].push(type);
            });
            Object.keys(result).forEach(slug => {
                result[slug].sort((a, b) => typeOrder.indexOf(a) - typeOrder.indexOf(b));
            });
            return result;
        }
        const categoryTypes = buildCategoryTypes();

        // 서브타입 필터 칩에 쓰이는 원형 아이콘 (카테고리 색상 + 유형별 글리프)
        function typeChipSvgMarkup(slug, type) {
            if (!type || type === "default" || !assetGlyphs[type]) return categoryChipSvgMarkup(slug);
            const color = categoryColors[slug];
            const glyph = assetGlyphs[type].replace(/\{\{color\}\}/g, color);
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 4 26 26">
                <circle cx="17" cy="17" r="13" fill="#ffffff"/>
                ${glyph}
            </svg>`;
        }

        // 서브필터 바를 윗줄(전체+카테고리 버튼)/아랫줄(세부 마커 칩 전체) 2줄로 렌더링
        // 카테고리 버튼 자체가 "해당 카테고리 전체 보기" 역할을 겸한다.
        function renderSubtypeBar() {
            const bar = document.getElementById("subtypeBar");
            if (!bar) return;
            const groupOrder = ["realestate", "renewable", "resource"];
            const activeGroups = groupOrder.filter(slug => (categoryTypes[slug] || []).length > 0);

            const allBtn = `<button class="category-chip-btn active" data-filter="all" onclick="toggleAll()">
                <span class="chip-icon">${categoryChipSvgMarkup("all")}</span>전체
            </button>`;

            const groupBoxes = activeGroups.map(slug => {
                const chips = categoryTypes[slug].map(type => `
                    <button class="subtype-chip-btn" data-category="${slug}" data-type="${type}" onclick="toggleType('${slug}', '${type}')">
                        <span class="subtype-chip-icon">${typeChipSvgMarkup(slug, type)}</span>${typeLabels[type] || type}
                    </button>
                `).join("");
                return `<div class="subtype-groupbox">
                    <button class="category-chip-btn" data-filter="${slug}" onclick="toggleCategory('${slug}')">
                        <span class="chip-icon">${categoryChipSvgMarkup(slug)}</span>${slugToCategory[slug]}
                    </button>
                    <div class="subtype-group-chips">${chips}</div>
                </div>`;
            }).join("");

            bar.innerHTML = `${allBtn}${groupBoxes}`;
            syncTopbarHeight();
        }
        renderSubtypeBar();

        // topbar는 내용(서브필터 2줄)에 따라 실제 높이가 달라지므로, 실측 높이를 지도 영역 여백에 반영한다.
        function syncTopbarHeight() {
            const topbar = document.querySelector(".topbar");
            const mapEl = document.getElementById("map");
            if (!topbar) return;
            const h = topbar.offsetHeight;
            if (mapEl) {
                mapEl.style.marginTop = `${h}px`;
                mapEl.style.height = `calc(100vh - ${h}px)`;
            }
        }
        window.addEventListener("resize", syncTopbarHeight);

        // 현재 켜져 있는 토글들을 사람이 읽을 수 있는 라벨로 합친다 (결과 패널 제목용).
        function buildActiveFilterLabel() {
            const parts = [];
            if (activeAll) {
                parts.push("전체");
            } else {
                activeCategories.forEach(slug => parts.push(slugToCategory[slug]));
                activeTypes.forEach(key => {
                    const type = key.split(":")[1];
                    parts.push(typeLabels[type] || type);
                });
                if (parts.length === 0) parts.push("선택 없음");
            }
            if (activeCountries.size > 0) {
                parts.push([...activeCountries].join("/"));
            }
            return parts.join(", ");
        }

        // 상단 칩(전체/카테고리/세부 마커 유형)을 클릭하면 해당하는 자산들을 목록으로 모아 보여준다.
        function renderResultsPanel() {
            const panel = document.getElementById("resultsPanel");
            const list = document.getElementById("resultsPanelList");
            const titleEl = document.getElementById("resultsPanelTitle");
            if (!panel || !list || !titleEl) return;

            const filtered = getFilteredAssets();
            titleEl.textContent = `${buildActiveFilterLabel()} · ${filtered.length}건`;

            list.innerHTML = filtered.length
                ? filtered.map(asset => `
                    <button class="results-item" onclick="focusAsset(${assets.indexOf(asset)})">
                        <img class="results-item-thumb" src="${asset.imageUrl || asset.logoUrl || ""}" alt="" onerror="this.style.visibility='hidden'">
                        <span class="results-item-text">
                            <strong>${asset.title}</strong>
                            <span>${asset.country}${asset.establishedDate ? " · " + asset.establishedDate : ""}</span>
                        </span>
                    </button>
                `).join("")
                : `<div class="results-panel-empty">해당하는 자산이 없습니다.</div>`;

            panel.style.display = "flex";
        }

        function closeResultsPanel() {
            document.getElementById("resultsPanel").style.display = "none";
        }

        // 목록에서 자산을 클릭하면 지도에서 해당 위치로 이동하고 팝업을 띄운다.
        function focusAsset(index) {
            const asset = assets[index];
            if (!asset || !map) return;
            map.setZoom(17);
            map.setCenter(asset.position);
            showPopup(asset.title, asset.description, `
                <span class="category-badge category-${categoryClass(asset.category)}">${asset.category}</span>
                <p class="established-date">투자/설립시기: ${asset.establishedDate}</p>
                <img src="${asset.imageUrl}" alt="${asset.title}" class="asset-image">
            `, asset);
        }

        // 국가 -> 국기 이미지 매핑
        const countryFlags = {
            "한국": "./kr.png",
            "미국": "./us.png",
            "베트남": "./vn.png",
            "인도네시아": "./id.png"
        };

        // 국가별 PNG 이미지를 지도 마커에 직접 사용 (줌아웃된 국가 단위 마커용)
        function countryMarkerIcon(country) {
            const flagUrl = countryFlags[country];
            if (!flagUrl) return categoryMarkerIcon(""); // 매핑에 없는 국가는 기본 핀으로 대체
            return {
                url: flagUrl,
                scaledSize: new google.maps.Size(44, 44),
                anchor: new google.maps.Point(22, 22)
            };
        }

        // 줌아웃된 국가 단위 마커의 아이콘: 여러 카테고리/유형이 동시에 켜져 있으면(또는 전체 상태면)
        // 특정 색을 대표할 수 없으므로 국기 아이콘으로, 정확히 하나만 켜져 있으면 그 색/글리프로 표시한다.
        function clusterMarkerIcon(country) {
            if (!activeAll && activeTypes.size === 1 && activeCategories.size === 0) {
                const [slug, type] = [...activeTypes][0].split(":");
                return typeMarkerIcon(slug, type);
            }
            if (!activeAll && activeCategories.size === 1 && activeTypes.size === 0) {
                return categoryMarkerIcon(slugToCategory[[...activeCategories][0]]);
            }
            return countryMarkerIcon(country);
        }

        // 상단 우측 국가별 마커(칩) 렌더링 — 클릭하면 해당 국가로 바로 이동
        function renderCountryBar() {
            const bar = document.getElementById("countryBar");
            if (!bar) return;
            const countries = [...new Set(assets.map(asset => asset.country))].sort();
            bar.innerHTML = countries.map(country => `
                <button class="country-chip-btn" data-country="${country}" onclick="toggleCountry('${country}')">
                    <img class="country-chip-flag" src="${countryFlags[country] || ""}" alt="">${country}
                </button>
            `).join("");
            // 국가 칩이 추가되면 topbar 실제 높이가 달라질 수 있으므로 다시 측정해 반영한다.
            syncTopbarHeight();
        }
        renderCountryBar();

        function highlightActiveCountry() {
            document.querySelectorAll(".country-chip-btn").forEach(el => {
                el.classList.toggle("active", activeCountries.has(el.dataset.country));
            });
        }

        // 국가 칩 on/off 토글: 여러 국가를 동시에 선택할 수 있으며, 선택된 국가가 있으면
        // 다른 카테고리/유형 필터와 AND로 결합되어 지도에 표시된다.
        function toggleCountry(country) {
            if (activeCountries.has(country)) {
                activeCountries.delete(country);
            } else {
                activeCountries.add(country);
            }
            applyFilterState();
        }

        // 상단 버튼은 모두 독립적인 on/off 토글이다.
        // activeAll: "전체" 토글 상태. activeCategories/activeTypes: 켜진 카테고리·세부 유형들의 집합(OR로 합쳐짐).
        // activeCountries: 켜진 국가들의 집합(비어있지 않으면 카테고리/유형 결과와 AND로 결합됨).
        let activeAll = true;
        const activeCategories = new Set();
        const activeTypes = new Set();
        const activeCountries = new Set();

        function getFilteredAssets() {
            let list;
            if (activeAll) {
                list = assets;
            } else {
                list = assets.filter(asset => {
                    const slug = categoryClass(asset.category);
                    const type = getAssetType(asset) || "default";
                    return activeCategories.has(slug) || activeTypes.has(`${slug}:${type}`);
                });
            }
            if (activeCountries.size > 0) {
                list = list.filter(asset => activeCountries.has(asset.country));
            }
            return list;
        }

        // 토글 상태가 바뀔 때마다 공유되는 동작: 버튼 active 표시 갱신 + 줌 재조정 + 마커/통계/목록 갱신
        function applyFilterState() {
            document.querySelectorAll(".category-chip-btn").forEach(el => {
                el.classList.toggle("active", el.dataset.filter === "all" ? activeAll : activeCategories.has(el.dataset.filter));
            });
            document.querySelectorAll(".subtype-chip-btn").forEach(el => {
                el.classList.toggle("active", activeTypes.has(`${el.dataset.category}:${el.dataset.type}`));
            });
            highlightActiveCountry();

            const filtered = getFilteredAssets();
            if (map) {
                if (activeCountries.size > 0) {
                    fitMapToAssets(filtered);
                } else if (assetsByCountry) {
                    map.moveCamera({ center: getGlobalAssetCenter(assetsByCountry), zoom: 3 });
                }
            }

            renderStatsPanel();
            updateMarkers();
            renderResultsPanel();
        }

        // "전체" 토글: 켜면 다른 카테고리/유형 선택을 모두 해제하고 전체를 보여준다.
        function toggleAll() {
            activeAll = !activeAll;
            if (activeAll) {
                activeCategories.clear();
                activeTypes.clear();
            }
            applyFilterState();
        }

        // 카테고리 박스 헤더 토글: 해당 카테고리 전체를 결과에 추가/제외한다.
        function toggleCategory(slug) {
            activeAll = false;
            if (activeCategories.has(slug)) {
                activeCategories.delete(slug);
            } else {
                activeCategories.add(slug);
                // 상위 카테고리를 켜면 그 안의 개별 세부 유형 선택은 이미 포함되므로 모두 끈다
                [...activeTypes].forEach(key => {
                    if (key.startsWith(`${slug}:`)) activeTypes.delete(key);
                });
            }
            applyFilterState();
        }

        // 세부 마커 유형 칩 토글: 해당 카테고리+유형 조합을 결과에 추가/제외한다.
        function toggleType(slug, type) {
            activeAll = false;
            const key = `${slug}:${type}`;
            if (activeTypes.has(key)) {
                activeTypes.delete(key);
            } else {
                activeTypes.add(key);
                // 상위 카테고리가 이미 켜져 있으면(해당 카테고리 전체 포함 상태) 세부 유형을 선택하는
                // 순간 상위는 끈다 — 상위 ON과 하위 ON이 동시에 표시되는 모순을 막는다.
                activeCategories.delete(slug);
            }
            applyFilterState();
        }

        // 전체 진출 국가의 위·경도 범위 중간값으로 아프리카 중심의 글로벌 화면을 만든다.
        function getGlobalAssetCenter(groupedAssets) {
            const countryCenters = Object.values(groupedAssets).map(countryAssets => ({
                lat: countryAssets.reduce((sum, asset) => sum + asset.position.lat, 0) / countryAssets.length,
                lng: countryAssets.reduce((sum, asset) => sum + asset.position.lng, 0) / countryAssets.length
            }));

            const lats = countryCenters.map(center => center.lat);
            const lngs = countryCenters.map(center => center.lng);
            return {
                lat: (Math.min(...lats) + Math.max(...lats)) / 2,
                lng: (Math.min(...lngs) + Math.max(...lngs)) / 2
            };
        }

        // 카테고리별 자산 개수 집계 (하단 패널 표시용)
        function renderCategoryCounts(assetList) {
            const counts = { realestate: 0, renewable: 0, resource: 0 };
            assetList.forEach(asset => {
                counts[categoryClass(asset.category)]++;
            });
            document.getElementById("countRealestate").textContent = counts.realestate;
            document.getElementById("countRenewable").textContent = counts.renewable;
            document.getElementById("countResource").textContent = counts.resource;
        }

        // 하단 통계 패널을 현재 토글 상태(getFilteredAssets)에 맞춰 갱신
        function renderStatsPanel() {
            const filtered = getFilteredAssets();
            const isDefaultView = activeAll && activeCountries.size === 0;

            document.getElementById("statTotal").textContent = filtered.length;
            document.getElementById("statTotalLabel").textContent = isDefaultView ? "총 자산" : "자산 수";

            if (activeCountries.size === 1) {
                document.getElementById("statScope").textContent = [...activeCountries][0];
                document.getElementById("statScopeLabel").textContent = "선택 국가";
            } else if (activeCountries.size > 1) {
                document.getElementById("statScope").textContent = `${activeCountries.size}개국`;
                document.getElementById("statScopeLabel").textContent = "선택 국가";
            } else {
                document.getElementById("statScope").textContent = new Set(filtered.map(asset => asset.country)).size;
                document.getElementById("statScopeLabel").textContent = "진출 국가";
            }

            renderCategoryCounts(filtered);
        }

        // 지도 초기화 함수
        function initMap() {
            // assets 변수가 정의되었는지 확인
            if (typeof assets === "undefined") {
                console.error("Error: 'assets' is not defined. Ensure assets.js is loaded correctly.");
                return;
            }

            // 자산을 국가별로 그룹화
            assetsByCountry = assets.reduce((acc, asset) => {
                const country = asset.country;
                if (!acc[country]) {
                    acc[country] = [];
                }
                acc[country].push(asset);
                return acc;
            }, {});

            // 통계 패널 업데이트 (전체 기준)
            renderStatsPanel();

            // 실제 진출 국가들의 위치 분포를 기준으로 첫 화면 중심 설정
            const globalCenter = getGlobalAssetCenter(assetsByCountry);
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 3,
                center: globalCenter,
                fullscreenControl: false,
                mapTypeId: google.maps.MapTypeId.SATELLITE
            });

            // 초기 줌 레벨 출력
            console.log(`Zoom level: ${map.getZoom()}`);

            // 줌 레벨 변화 감지
            map.addListener("zoom_changed", () => {
                console.log(`Zoom level: ${map.getZoom()}`);
                updateMarkers();
            });

            // 마커 업데이트 함수 (전역 변수에 할당하여 initMap 밖에서도 호출 가능하게 함)
            updateMarkers = function() {
                // 기존 마커 제거
                markers.forEach(marker => marker.setMap(null));
                markers = [];

                const zoom = map.getZoom();
                const filteredAssets = getFilteredAssets();

                if (zoom <= 3) {
                    // 줌 레벨 3 이하: 국가별 마커 표시 (필터 적용된 자산 기준)
                    const filteredByCountry = filteredAssets.reduce((acc, asset) => {
                        const country = asset.country;
                        if (!acc[country]) acc[country] = [];
                        acc[country].push(asset);
                        return acc;
                    }, {});

                    Object.keys(filteredByCountry).forEach(country => {
                        const countryAssets = filteredByCountry[country];
                        // 국가 중심점 계산 (자산 위치의 평균)
                        let latSum = 0, lngSum = 0;
                        countryAssets.forEach(asset => {
                            latSum += asset.position.lat;
                            lngSum += asset.position.lng;
                        });
                        const center = {
                            lat: latSum / countryAssets.length,
                            lng: lngSum / countryAssets.length
                        };

                        const marker = new google.maps.Marker({
                            position: center,
                            map: map,
                            title: country,
                            icon: clusterMarkerIcon(country)
                        });

                        // 국가 마커 클릭 시 팝업 없이 해당 국가를 on/off 토글 (국가 칩 클릭과 동일하게 동작)
                        marker.addListener("click", () => {
                            toggleCountry(country);
                        });

                        markers.push(marker);
                    });
                } else {
                    // 줌 레벨 4 이상: 개별 자산 마커 표시 (카테고리별 아이콘)
                    filteredAssets.forEach(asset => {
                        const marker = new google.maps.Marker({
                            position: asset.position,
                            map: map,
                            title: asset.title,
                            icon: assetMarkerIcon(asset)
                        });

                        marker.addListener("click", () => {
                            // 팝업 창 표시 및 줌 조정 (asset 객체 전달)
                            showPopup(asset.title, asset.description, `
                                <span class="category-badge category-${categoryClass(asset.category)}">${asset.category}</span>
                                <p class="established-date">투자/설립시기: ${asset.establishedDate}</p>
                                <!-- <img src="${asset.logoUrl}" alt="Logo" class="logo"> -->
                                <img src="${asset.imageUrl}" alt="${asset.title}" class="asset-image">
                            `, asset);
                            // 줌 레벨 17로 설정 및 자산 위치 중심
                            map.setZoom(17);
                            map.setCenter(asset.position);
                        });

                        markers.push(marker);
                    });
                }
            };

            // 초기 마커 설정
            updateMarkers();
        }

        // 팝업 창 표시 함수 (개별 자산용)
        function showPopup(title, description, extraContent, asset = null) {
            const popupOverlay = document.getElementById("popupOverlay");
            const popupTitle = document.getElementById("popupTitle");
            const popupDescription = document.getElementById("popupDescription");
            const popupExtra = document.getElementById("popupExtra");

            // 팝업 내용 설정
            popupTitle.textContent = title;
            popupDescription.textContent = description;
            popupExtra.innerHTML = extraContent;

            // 마지막으로 확인한 자산 저장
            if (asset) {
                lastViewedAsset = asset;
            }

            // 팝업 표시
            popupOverlay.style.display = "block";
        }

        // 팝업 창 닫기 함수
        function closePopup() {
            document.getElementById("popupOverlay").style.display = "none";
        }

        // 주어진 자산 목록이 모두 보이도록 지도 중심/줌을 맞춘다 (선택된 국가가 하나 이상일 때 사용).
        function fitMapToAssets(assetList) {
            if (!map || !assetList || assetList.length === 0) return;

            const lats = assetList.map(asset => asset.position.lat);
            const lngs = assetList.map(asset => asset.position.lng);
            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);
            const minLng = Math.min(...lngs);
            const maxLng = Math.max(...lngs);
            const center = { lat: (minLat + maxLat) / 2, lng: (minLng + maxLng) / 2 };

            // fitBounds의 자동 이동 애니메이션 대신 필요한 줌을 직접 계산해 즉시 이동한다.
            const mapElement = document.getElementById("map");
            const padding = 100;
            const availableWidth = Math.max(mapElement.clientWidth - padding, 256);
            const availableHeight = Math.max(mapElement.clientHeight - padding, 256);
            const lngFraction = Math.max((maxLng - minLng) / 360, 1 / Math.pow(2, 10));
            const latToMercator = lat => {
                const sin = Math.sin(lat * Math.PI / 180);
                return Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI);
            };
            const latFraction = Math.max(Math.abs(latToMercator(maxLat) - latToMercator(minLat)), 1 / Math.pow(2, 10));
            const zoom = Math.max(4, Math.min(10, Math.floor(Math.min(
                Math.log2(availableWidth / 256 / lngFraction),
                Math.log2(availableHeight / 256 / latFraction)
            ))));

            map.moveCamera({ center, zoom });
        }

    </script>

    <!-- Google Maps JavaScript API 로드 -->

        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKZ64N6aTmQLaU312nCqXeyrNa-lol2IQ&callback=initMap&loading=async">
    </script>
